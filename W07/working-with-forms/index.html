<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout Form</title>
    <link rel="icon" href="images/favicon.ico">
    <link rel="stylesheet" href="styles.css" />
    <script src="scripts-form.js" defer></script>
</head>

<body>
    <header>
        <h1>Checkout</h1>
    </header>

    <main>
        <section class="errors"></section>

        <form id="checkoutForm" action="completed.html" method="get">
            <label for="fullName">Full Name:</label>
            <input type="text" id="fullName" name="fullName" placeholder="Jane Doe" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="this@this.com" required>

            <label for="address">Address:</label>
            <textarea id="address" name="address" rows="4" required placeholder="123 Street"></textarea>

            <label for="paymentMethod">Payment Method:</label>
            <select id="paymentMethod" name="paymentMethod" required aria-expanded="false"
                aria-controls="creditCardNumberContainer paypalUsernameContainer">
                <option value="">Select Payment Method</option>
                <option value="creditCard">Credit Card</option>
                <option value="paypal">PayPal</option>
            </select>

            <div id="creditCardNumberContainer" class="hide payment-section" role="region"
                aria-labelledby="creditCardLabel">
                <label id="creditCardLabel" for="creditCardNumber">Credit Card Number:</label>
                <input type="text" id="creditCardNumber" name="creditCardNumber" pattern="[0-9]{16}"
                    placeholder="1234123412344444" required />

                <label id="expirationDate">Expiration</label>
                <div class="expiration-group">
                    <input type="text" id="month" name="expMonth" placeholder="07" aria-labelledby="expirationDate">
                    <input type="text" id="year" name="expYear" placeholder="24" aria-labelledby="expirationDate">
                </div>
            </div>

            <div id="paypalUsernameContainer" class="hide payment-section" role="region" aria-labelledby="paypalLabel">
                <label id="paypalLabel" for="paypalUsername">PayPal Username:</label>
                <input type="text" id="paypalUsername" name="paypalUsername" placeholder="Enter PayPal username"
                    required />
            </div>

            <button type="submit">Place Order</button>
        </form>
    </main>
</body>

</html>
