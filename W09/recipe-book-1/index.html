<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recipe Book</title>
    <meta name="description" content="Recipe Book with a featured Apple Crisp recipe." />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Recipe Book" />
    <meta property="og:description"
        content="A simple responsive recipe book featuring a delicious Apple Crisp recipe." />
    <meta property="og:url" content="https://yourusername.github.io/wdd131/recipes/" />
    <meta property="og:image" content="images/social-preview-image.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Recipe Book" />
    <meta name="twitter:description"
        content="A simple responsive recipe book featuring a delicious Apple Crisp recipe." />
    <meta name="twitter:image" content="images/social-preview-image.png" />

    <link rel="icon" href="favicon.ico" />
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@700&family=Arial:wght@400;700&display=swap"
        rel="stylesheet" />

    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <header>
        <div class="brand">
            <img src="images/recipe-book.png" alt="Recipe Book logo" class="logo" />
            <h1>Recipe Book</h1>
        </div>
    </header>

    <main>
        <section class="search-section">
            <form class="search-form" action="#" method="get">
                <input type="text" name="search" placeholder="Find a recipe" aria-label="Search recipes" />
                <button type="submit" aria-label="Search">
                    <img src="images/search.svg" alt="Search icon" />
                </button>
            </form>
        </section>

        <article class="recipe-card">
            <img src="images/apple-crisp.jpg" alt="Apple crisp in a baking dish" class="recipe-image" />

            <div class="recipe-content">
                <p class="tag">Dessert</p>
                <h2>Apple Crisp</h2>

                <span class="rating" role="img" aria-label="Rating: 4 out of 5 stars">
                    <span aria-hidden="true" class="icon-star">⭐</span>
                    <span aria-hidden="true" class="icon-star">⭐</span>
                    <span aria-hidden="true" class="icon-star">⭐</span>
                    <span aria-hidden="true" class="icon-star">⭐</span>
                    <span aria-hidden="true" class="icon-star-empty">☆</span>
                </span>

                <p class="description">
                    This apple crisp is warm, cozy, and packed with tender cinnamon apples
                    under a buttery oat topping. It is simple to make and perfect for fall
                    dinners, holidays, or anytime you want an easy homemade dessert.
                </p>
            </div>
        </article>
    </main>

    <footer>
        <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">
            Recipe icons created by Freepik - Flaticon
        </a>

        <div class="social">
            <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates -->
            <a href="#"><img src="images/instagram_icon.svg" alt="instagram icon" /></a>
            <a href="#"><img src="images/youtube_icon.svg" alt="youtube icon" /></a>
            <a href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon" /></a>
        </div>
    </footer>
</body>

</html>
